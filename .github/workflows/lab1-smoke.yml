name: Lab1 Smoke Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop \
            -p 3000:3000 \
            bkimminich/juice-shop:v20.0.0

      - name: Wait for application
        timeout-minutes: 2
        run: |
          for i in {1..60}; do
            if curl -fs http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Verify HTTP 200
        run: |
          code=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:3000)
          test "$code" = "200"
